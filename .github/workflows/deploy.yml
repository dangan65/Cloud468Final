name: CI/CD — Build, Push & Deploy

on:
  push:
    branches: [main]
  # Allow manual trigger from the GitHub Actions UI
  workflow_dispatch:

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/url-shortener

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Build the Docker image and push it to Docker Hub
  # Runs on GitHub-hosted infrastructure (free Ubuntu runner).
  # ---------------------------------------------------------------------------
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest

    outputs:
      # Pass the exact image tag downstream so the deploy job pulls the same SHA
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract image metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            # Tag with the short Git SHA for traceability (e.g. sha-a1b2c3d)
            type=sha,prefix=sha-
            # Also tag as 'latest' on pushes to main
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./app
          dockerfile: ./app/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GitHub Actions cache speeds up repeat builds significantly
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # Job 2: Deploy to CloudLab
  # Runs on the self-hosted runner installed on the CloudLab node.
  # The runner pulls the new image from Docker Hub and performs a zero-downtime
  # rolling update via `docker compose up -d`.
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to CloudLab
    needs: build-and-push
    # 'self-hosted' matches the label assigned to the CloudLab runner.
    # Add additional labels (e.g. [self-hosted, cloudlab]) if needed.
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Pull latest image from Docker Hub
        run: docker pull ${{ env.IMAGE_NAME }}:latest

      - name: Restart stack with new image
        env:
          # Override the image reference in docker-compose.yml
          DOCKER_IMAGE: ${{ env.IMAGE_NAME }}:latest
        run: |
          docker compose pull api
          docker compose up -d --no-build --remove-orphans
          docker compose ps

      - name: Verify deployment health
        run: |
          echo "Waiting for health check..."
          sleep 10
          curl --fail http://localhost:8000/health \
            || (docker compose logs api && exit 1)
